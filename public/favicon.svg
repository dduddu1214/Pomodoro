<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="tomato" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Tomato body -->
  <ellipse cx="256" cy="290" rx="130" ry="125" fill="url(#tomato)"/>
  <!-- Highlight -->
  <ellipse cx="220" cy="255" rx="40" ry="55" fill="white" opacity="0.15" transform="rotate(-15 220 255)"/>
  <!-- Stem -->
  <rect x="248" y="155" width="16" height="40" rx="8" fill="#a16207"/>
  <!-- Leaf -->
  <path d="M264 175 Q300 140 310 160 Q295 175 264 175Z" fill="url(#leaf)"/>
  <!-- Clock face hint - minute marks -->
  <circle cx="256" cy="290" r="80" fill="none" stroke="white" stroke-width="3" opacity="0.2"/>
  <!-- Clock hands -->
  <line x1="256" y1="290" x2="256" y2="230" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="290" x2="296" y2="290" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="256" cy="290" r="5" fill="white" opacity="0.8"/>
</svg>
